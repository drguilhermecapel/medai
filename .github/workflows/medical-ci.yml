name: Medical CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: medai

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'  # Fail on critical/high
      
      - name: Python security scan
        run: |
          pip install bandit safety
          bandit -r backend/app/ -f json -o bandit-report.json
          safety check -r backend/requirements.txt --json > safety-report.json
      
      - name: Upload security artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            trivy-results.sarif
            bandit-report.json
            safety-report.json

  backend-tests:
    runs-on: ubuntu-latest
    needs: security-scan
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: medai_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt -r requirements-test.txt
      
      - name: Run migrations
        run: |
          cd backend
          alembic upgrade head
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/medai_test
      
      - name: Run tests with coverage
        run: |
          cd backend
          pytest --cov=app --cov-report=xml --cov-fail-under=85
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/medai_test

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Start application stack
        run: |
          docker-compose -f docker-compose.test.yml up -d
          sleep 30
      
      - name: Install Playwright
        run: |
          cd frontend
          npm install
          npx playwright install
      
      - name: Run E2E tests
        run: |
          cd frontend
          npx playwright test --reporter=junit
      
      - name: Upload E2E results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results
          path: frontend/test-results/

  deploy:
    runs-on: ubuntu-latest
    needs: [backend-tests, e2e-tests]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment"
          # Add deployment logic here